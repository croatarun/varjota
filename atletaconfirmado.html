<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meia Maratona - Varjota</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Variáveis globais para facilitar a troca de cores do sistema */
        :root { 
            --primary: #1a3a16; /* Verde principal dos botões e títulos */
            --bg: #f8fafc;      /* Cor de fundo cinza bem claro da página */
        }
        
        /* Estilo do corpo da página: centraliza todo o conteúdo na tela */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
        }
        
        /* Caixa branca principal que guarda o gerador (estilo card) */
        .container { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); /* Sombra suave no fundo */
            max-width: 400px; 
            width: 100%; 
        }
        
        /* Título superior (MEIA MARATONA - VARJOTA/CE) */
        h1 { 
            font-size: 14px; 
            text-align: center; 
            color: var(--primary); 
            letter-spacing: 2px; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
        }
        
        /* Caixa que simula a tela do celular (proporção 9:16 de um Story) */
        .preview-box { 
            width: 100%; 
            aspect-ratio: 9/16; 
            background: #e2e8f0; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #cbd5e1; 
        }
        
        /* O elemento Canvas (onde a mágica do desenho acontece) ocupa 100% do preview */
        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }
        
        /* Painel cinza que agrupa os seletores (sliders) e caixas de texto */
        .controls { 
            margin-top: 20px; 
            background: #f1f5f9; 
            padding: 20px; 
            border-radius: 20px; 
        }
        
        /* Textos pequenos indicando o que é cada input (Ex: NOME DO ATLETA) */
        label { 
            font-size: 10px; 
            font-weight: 900; 
            color: #64748b; 
            text-transform: uppercase; 
            display: block; 
            margin: 10px 0 5px; 
        }
        
        /* Caixas de texto onde o usuário digita o Nome e a Equipe */
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-family: 'Montserrat'; 
            font-weight: 700; 
            box-sizing: border-box; 
            margin-bottom: 5px; 
        }
        
        /* Barras de arrastar (Zoom, Posição X e Posição Y) */
        input[type="range"] { 
            width: 100%; 
            height: 6px; 
            accent-color: var(--primary); /* Muda a cor da bolinha do slider para o verde */
            margin-bottom: 10px; 
        }
        
        /* Estilo base para todos os botões da página */
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        
        /* Botão preto de Upload ("1. Escolher Foto") */
        .btn-upload { 
            background: #0f172a; 
            color: white; 
            margin-bottom: 15px; 
        }
        
        /* Botão verde de Download ("2. Baixar Story") */
        .btn-download { 
            background: var(--primary); 
            color: white; 
            margin-top: 20px; 
        }
        
        /* Organiza os seletores de Posição X e Y lado a lado na mesma linha */
        .row { 
            display: flex; 
            gap: 10px; 
        }
        .row div { 
            flex: 1; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MEIA MARATONA - VARJOTA/CE</h1>
    
    <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">1. Escolher Foto</button>
    
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div class="preview-box">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <label>Nome do Atleta</label>
        <input type="text" id="nomeAtleta" placeholder="Ex: CARLOS HENRIQUE">
        
        <label>Equipe</label>
        <input type="text" id="equipeAtleta" placeholder="Ex: VARJORUN">
        
        <label>Zoom da Foto</label>
        <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1.0">
        
        <div class="row">
            <div>
                <label>Posição X (Horizontal)</label>
                <input type="range" id="posX" min="-1500" max="1500" value="0">
            </div>
            <div>
                <label>Posição Y (Vertical)</label>
                <input type="range" id="posY" min="-1500" max="1500" value="0">
            </div>
        </div>
    </div>

    <button class="btn btn-download" id="btnDownload">2. Baixar Story</button>
</div>

<script>
    // Captura os elementos do Canvas e cria o contexto 2D de desenho
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    // Instancia os objetos de imagem que o JavaScript vai processar
    const imgMoldura = new Image();
    const imgAtleta = new Image();

    // Definições de tamanho: W=Largura, H=Altura (Tamanho padrão de Story do Instagram)
    const W = 1080, H = 1920;
    
    // Define os limites da foto. Como você pediu em tela cheia, ela começa em X=0, Y=0 e vai até o tamanho total.
    const area = { x: 0, y: 0, w: 1080, h: 1920 };
    
    // Multiplicador de qualidade. O Canvas na tela é pequeno, mas é gerado 3x maior internamente para não ficar pixelado ao baixar.
    const qualityScale = 3; 

    // Ignora restrições de segurança do navegador para evitar que o Canvas seja travado ao carregar imagens locais/remotas
    imgMoldura.crossOrigin = "anonymous";
    
    // Caminho da sua imagem da moldura (deve estar na mesma pasta do arquivo HTML)
    imgMoldura.src = 'euvou.png'; 
    
    // Assim que a moldura carregar completamente, configura o tamanho real do Canvas e roda a renderização inicial
    imgMoldura.onload = () => {
        canvas.width = W * qualityScale;
        canvas.height = H * qualityScale;
        ctx.scale(qualityScale, qualityScale); /* Escalona o desenho para manter a alta definição */
        render();
    };

    // Monitora quando o usuário escolhe uma foto do próprio dispositivo
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (f) => {
                imgAtleta.src = f.target.result; // Transforma a foto em dados utilizáveis pelo Canvas
                imgAtleta.onload = render;        // Redesenha a tela assim que a foto carregar
            };
            reader.readAsDataURL(file);
        }
    };

    // Atalho: Seleciona todos os inputs da página e diz que se QUALQUER um mexer, a função render() é executada na hora
    document.querySelectorAll('input').forEach(input => input.oninput = render);

    // ==========================================
    // FUNÇÃO PRINCIPAL: DESENHA TUDO EM CAMADAS
    // ==========================================
    function render() {
        // Limpa o canvas anterior para não acumular rastro de imagens antigas ao mover os sliders
        ctx.clearRect(0, 0, W, H);
        
        // Ativa filtros de suavização para deixar as imagens com a melhor qualidade possível
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // --- CAMADA 1: FOTO DO ATLETA (Fica no fundo) ---
        if (imgAtleta.src && imgAtleta.complete) {
            ctx.save(); // Salva o estado atual do canvas
            
            // Delimita a área visível da foto para recortar nos cantos da tela cheia
            ctx.beginPath();
            ctx.rect(area.x, area.y, area.w, area.h);
            ctx.clip(); // Tudo o que for desenhado a partir daqui só aparece dentro deste retângulo
            
            // Pega os valores atuais dos seletores da página
            const z = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);
            
            // Faz o cálculo de proporção (aspect ratio) da foto para ela não distorcer/achatar
            const aspect = imgAtleta.width / imgAtleta.height;
            let drawW = area.w * z;
            let drawH = (area.w / aspect) * z;
            
            // Desenha a foto aplicando o zoom e os ajustes de movimento horizontal (px) e vertical (py)
            ctx.drawImage(imgAtleta, 
                area.x + (area.w - drawW) / 2 + px, 
                area.y + (area.h - drawH) / 2 + py, 
                drawW, drawH
            );
            ctx.restore(); // Restaura o canvas para remover o recorte de clipping
        }

        // --- CAMADA 2: MOLDURA 'EUVOU.PNG' (Fica por cima da foto) ---
        if (imgMoldura.complete) {
            ctx.drawImage(imgMoldura, 0, 0, W, H);
        }

        // --- CAMADA 3: OS TEXTOS (Ficam por cima de tudo) ---
        renderTextos();
    }

    // ==========================================
    // FUNÇÃO DE AJUSTE DOS TEXTOS
    // ==========================================
    function renderTextos() {
        // Pega o que foi digitado, remove espaços inúteis e transforma tudo em Letras Maiúsculas
        const nome = document.getElementById('nomeAtleta').value.toUpperCase().trim();
        const equipe = document.getElementById('equipeAtleta').value.toUpperCase().trim();

        // Alinhamento centralizado com base no ponto X fornecido
        ctx.textAlign = 'center';

        // --- CONFIGURAÇÃO DO NOME DO ATLETA ---
        if (nome) {
            // '900' é o peso (Ultra-Bold) e '85px' é o tamanho da letra. Montserrat é a fonte importada.
            ctx.font = "900 85px 'Montserrat'";
            
            // Define a cor do texto do nome (Hexadecimal)
            ctx.fillStyle = "#1f1c8a";
            
            // Desenha o Nome: W / 2 (Metade da largura = Centro), 1600 (Altura a partir do topo)
            // AJUSTE AQUI: Mude o 1600 para maior (descer) ou menor (subir)
            ctx.fillText(nome, W / 2, 1600);
        }

        // --- CONFIGURAÇÃO DA EQUIPE ---
        if (equipe) {
            // '700' é o peso (Bold) e '44px' é o tamanho da letra da equipe (menor que o nome)
            ctx.font = "700 44px 'Montserrat'";
            
            // Define a cor do texto da equipe (Hexadecimal cinza)
            ctx.fillStyle = "#1f1c8a";
            
            // Desenha a Equipe: Deve ter uma altura maior que o nome (ex: 1670) para ficar posicionada abaixo dele.
            // AJUSTE AQUI: Mude o 1670 para controlar a distância entre o nome e a equipe
            ctx.fillText(equipe, W / 2, 1670);
        }
    }

    // ==========================================
    // PROCESSO DE DOWNLOAD DA IMAGEM
    // ==========================================
    document.getElementById('btnDownload').onclick = () => {
        // Impede o download se o usuário ainda não adicionou uma foto
        if (!imgAtleta.src) return alert("Selecione sua foto primeiro!");
        
        try {
            // Cria um link de download invisível no sistema
            const link = document.createElement('a');
            link.download = 'Varjota_Edicao_Santana.png'; // Nome do arquivo final salvo
            
            // Converte todo o conteúdo processado no Canvas em uma imagem PNG real de máxima qualidade (1.0)
            link.href = canvas.toDataURL('image/png', 1.0);
            
            // Simula o clique do usuário para iniciar o download automaticamente
            link.click();
        } catch (err) {
            console.error(err);
            // Aviso técnico caso o usuário abra o arquivo clicando duas vezes direto no PC (sem rodar um servidor local)
            alert("Erro ao baixar. Certifique-se de testar usando um servidor local.");
        }
    };
</script>

</body>
</html>
